<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred | LSU Integrated Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        <nav class="sidebar">
            <h1>ALFRED</h1>
            <button onclick="nav('chat')" id="nav-chat" class="nav-item active">💬 AI ASSISTANT</button>
            <button onclick="nav('calendar')" id="nav-cal" class="nav-item">📅 STUDY CALENDAR</button>
            <button onclick="scanInbox()" id="nav-scan" class="nav-item">📧 SCAN INBOX</button>

            <div class="sidebar-footer">
                LOUISIANA STATE UNIVERSITY
            </div>
        </nav>

        <main class="main-stage">
            
            <section id="chat-view">
                <div id="chat-container">
                    <div class="bubble alfred">
                        Welcome. How can I assist you?
                    </div>
                </div>
                <div class="input-tray">
                    <input type="text" id="query" placeholder="Ask Alfred..." onkeydown="if(event.key==='Enter') send()">
                    <button class="btn-send" onclick="send()">SEND</button>
                </div>
            </section>

            <section id="calendar-view" style="display: none;">
                <div class="cal-header">
                    <button onclick="changeMonth(-1)" class="btn-cal-nav">PREV</button>
                    <div class="cal-header-center">
                        <h2 id="month-label">Month Year</h2>
                        <select id="year-select" onchange="changeYear(this.value)"></select>
                    </div>
                    <button onclick="changeMonth(1)" class="btn-cal-nav">NEXT</button>
                    <button onclick="openAddModal()" class="btn-add-event">+ Add Event</button>
                </div>
                <div class="cal-grid" id="calendar-grid">
                    <div class="cal-day-label">SUN</div><div class="cal-day-label">MON</div>
                    <div class="cal-day-label">TUE</div><div class="cal-day-label">WED</div>
                    <div class="cal-day-label">THU</div><div class="cal-day-label">FRI</div>
                    <div class="cal-day-label">SAT</div>
                </div>
            </section>

        </main>
    </div>

    <div id="add-modal" onclick="closeAddModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2>New Event</h2>
            <p class="modal-label">TITLE</p>
            <input id="add-title" type="text" placeholder="e.g. Quiz 3">
            <p class="modal-label">DATE</p>
            <input id="add-date" type="date">
            <p class="modal-label">DETAILS</p>
            <input id="add-desc" type="text" placeholder="e.g. 10:30am, Room 101 (optional)">
            <div class="modal-actions">
                <button class="btn-delete" onclick="closeAddModal()">Cancel</button>
                <button onclick="submitAddEvent()">Add</button>
            </div>
        </div>
    </div>

    <div id="event-modal" onclick="closeEventModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="modal-view">
                <h2 id="modal-title"></h2>
                <p class="modal-label">DATE</p>
                <p id="modal-date"></p>
                <p class="modal-label" id="modal-desc-label">DETAILS</p>
                <p id="modal-desc"></p>
                <div class="modal-actions">
                    <button class="btn-delete" onclick="deleteEventFromModal()">Delete</button>
                    <button class="btn-edit" onclick="openEditForm()">Edit</button>
                    <button onclick="closeEventModal()">Close</button>
                </div>
            </div>
            <div id="modal-edit" style="display:none">
                <p class="modal-label">TITLE</p>
                <input id="edit-title" type="text">
                <p class="modal-label">DATE</p>
                <input id="edit-date" type="date">
                <p class="modal-label">DETAILS</p>
                <input id="edit-desc" type="text">
                <div class="modal-actions">
                    <button class="btn-delete" onclick="closeEditForm()">Cancel</button>
                    <button onclick="saveEventEdit()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
