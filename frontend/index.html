<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred | LSU Academic Assistant</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --lsu-purple: #461D7C;
            --lsu-gold: #FDD023;
            --bg-light: #f4f7f6;
            --text-main: #2c3e50;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        /* --- Layout Structure --- */
        .app-shell {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 280px;
            background-color: var(--lsu-purple);
            color: var(--lsu-gold);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .sidebar h1 {
            font-size: 1.6rem;
            text-align: center;
            margin: 0 0 40px 0;
            border-bottom: 2px solid var(--lsu-gold);
            padding-bottom: 15px;
            letter-spacing: 1.5px;
        }

        .nav-item {
            background: transparent;
            border: 1px solid var(--lsu-gold);
            color: var(--lsu-gold);
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            border-radius: 12px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s ease-in-out;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--lsu-gold);
            color: var(--lsu-purple);
        }

        .main-stage {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        /* --- Chat Rendering & Markdown Styling --- */
        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
        }

        .bubble {
            max-width: 85%;
            padding: 20px 25px;
            border-radius: 20px;
            line-height: 1.7;
            font-size: 1.05rem;
            box-shadow: var(--shadow);
            white-space: pre-wrap;       /* Preservation of line breaks */
            word-wrap: break-word;      /* Force break on long words */
            overflow-wrap: break-word;  /* Ensure text stays inside bubble */
        }

        .user {
            align-self: flex-end;
            background-color: var(--lsu-purple);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .alfred {
            align-self: flex-start;
            background-color: var(--white);
            border-left: 8px solid var(--lsu-gold);
            border-bottom-left-radius: 4px;
        }

        /* --- Thinking Indicator Animation --- */
        .thinking-bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 15px 20px !important;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--lsu-purple);
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* Markdown Styling */
        .alfred h2, .alfred h3 { color: var(--lsu-purple); margin-top: 1.5em; }
        .alfred table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #fafafa;
            border-radius: 8px;
            overflow: hidden;
        }
        .alfred th { background: #f2f2f2; padding: 12px; border: 1px solid #ddd; }
        .alfred td { padding: 12px; border: 1px solid #ddd; }

        /* --- Input Controls --- */
        .input-tray {
            background: var(--white);
            padding: 30px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 18px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
        }

        .btn-send {
            background-color: var(--lsu-purple);
            color: white;
            border: none;
            padding: 0 35px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Calendar View --- */
        #calendar-view { display: none; padding: 50px; overflow-y: auto; }
        .event-item {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 10px solid var(--lsu-purple);
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav class="sidebar">
            <h1>ALFRED</h1>
            <button onclick="nav('chat')" id="nav-chat" class="nav-item active">💬 AI ASSISTANT</button>
            <button onclick="nav('calendar')" id="nav-cal" class="nav-item">📅 STUDY CALENDAR</button>
            <div style="margin-top: auto; text-align: center; font-size: 0.8rem; font-weight: 800;">
                LOUISIANA STATE UNIVERSITY
            </div>
        </nav>

        <main class="main-stage">
            <section id="chat-view" style="display: flex; flex-direction: column; height: 100%;">
                <div id="chat-container">
                    <div class="bubble alfred">
                    Welcome. How can I assist you?
                    </div>
                </div>
                <div class="input-tray">
                    <input type="text" id="query" placeholder="Ask Alfred..." onkeydown="if(event.key==='Enter') send()">
                    <button class="btn-send" onclick="send()">SEND</button>
                </div>
            </section>

            <section id="calendar-view">
                <h2 style="color: var(--lsu-purple); margin-bottom: 40px;">Academic Deadlines</h2>
                <div id="event-anchor"><p style="color: #999;">No deadlines extracted yet.</p></div>
            </section>
        </main>
    </div>

    <script>
        let threadId = null;

        function nav(view) {
            const cv = document.getElementById('chat-view'), cal = document.getElementById('calendar-view');
            const nc = document.getElementById('nav-chat'), ncal = document.getElementById('nav-cal');
            if (view === 'calendar') {
                cv.style.display = 'none'; cal.style.display = 'block';
                nc.classList.remove('active'); ncal.classList.add('active');
                updateCalendar();
            } else {
                cv.style.display = 'flex'; cal.style.display = 'none';
                ncal.classList.remove('active'); nc.classList.add('active');
            }
        }

        async function send() {
            const input = document.getElementById('query');
            const val = input.value.trim();
            if(!val) return;

            render('user', val);
            input.value = '';
            showThinking();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val, threadId })
                });
                const data = await response.json();
                threadId = data.threadId;
                removeThinking();
                render('alfred', data.response);
            } catch (e) {
                removeThinking();
                render('alfred', "**System Error**: Unable to reach the C# backend.");
            }
        }

        function showThinking() {
            const chat = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'bubble alfred thinking-bubble';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeThinking() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function render(role, text) {
            const chat = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerHTML = (role === 'alfred') ? marked.parse(text) : text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function updateCalendar() {
            const anchor = document.getElementById('event-anchor');
            try {
                const res = await fetch('/events');
                const list = await res.json();
                if (list.length === 0) { anchor.innerHTML = '<p>No events found.</p>'; return; }
                anchor.innerHTML = list.map(e => `
                    <div class="event-item">
                        <div style="color: var(--lsu-purple); font-weight: 900; font-size: 0.8rem;">${new Date(e.eventDate).toLocaleDateString()}</div>
                        <div style="font-size: 1.3rem; font-weight: 700; margin: 5px 0;">${e.title}</div>
                        <div style="color: #666;">${e.description}</div>
                    </div>
                `).join('');
            } catch (err) { anchor.innerHTML = '<p>Error syncing with database.</p>'; }
        }
    </script>
</body>
</html>
