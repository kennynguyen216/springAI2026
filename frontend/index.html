<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred AI - Chat History</title>
    <style>
        :root { --lsu-purple: #461d7c; --lsu-gold: #fdd023; --dark-bg: #1e1e2e; --sidebar-bg: #181825; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #cdd6f4; display: flex; height: 100vh; margin: 0; }
        
        /* Sidebar Styles */
        #sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid #45475a; display: flex; flex-direction: column; }
        #new-chat-btn { margin: 15px; padding: 12px; background: var(--lsu-gold); color: var(--lsu-purple); font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        #history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .history-item:hover { background: #313244; }
        .history-item.active { border-color: var(--lsu-gold); background: #313244; }

        /* Main Chat Area */
        #main-content { flex: 1; display: flex; flex-direction: column; }
        header { background: var(--lsu-purple); color: var(--lsu-gold); padding: 1rem; text-align: center; font-weight: bold; border-bottom: 2px solid var(--lsu-gold); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { align-self: flex-end; background: #89b4fa; color: #1e1e2e; }
        .bot { align-self: flex-start; background: #313244; border: 1px solid #45475a; }
        
        footer { padding: 20px; background: #181825; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #313244; color: white; outline: none; }
        button#send-btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--lsu-gold); color: var(--lsu-purple); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar">
        <button id="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        <div id="history-list">
            </div>
    </div>

    <div id="main-content">
        <header>ALFRED: MULTI-AGENT SYSTEM</header>
        <div id="chat-window"></div>
        <footer>
            <input type="text" id="user-input" placeholder="Ask Alfred..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </footer>
    </div>

    <script>
        let currentThreadId = null;

        window.onload = loadHistory;

        async function loadHistory() {
            const res = await fetch('/threads');
            const threads = await res.json();
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            threads.reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = `history-item ${id === currentThreadId ? 'active' : ''}`;
                item.innerText = `Chat: ${id.substring(0, 8)}...`;
                item.onclick = () => switchChat(id);
                list.appendChild(item);
            });
        }

        async function switchChat(id) {
            currentThreadId = id;
            document.getElementById('chat-window').innerHTML = '';
            const res = await fetch(`/threads/${id}`);
            const messages = await res.json();
            messages.forEach(m => appendMessage(m.content, m.role.toLowerCase()));
            loadHistory();
        }

        function startNewChat() {
            currentThreadId = null;
            document.getElementById('chat-window').innerHTML = '';
            loadHistory();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            input.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, threadId: currentThreadId })
            });

            const data = await response.json();
            if (response.ok) {
                if (!currentThreadId) {
                    currentThreadId = data.threadId;
                    loadHistory();
                }
                appendMessage(data.response, 'bot');
            }
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type === 'assistant' ? 'bot' : type}`;
            div.innerText = text;
            const win = document.getElementById('chat-window');
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
